# Compliance Gap Templates by Tier

gaps:
  High-Risk:
    - id: "ce-marking"
      title: "CE Marking and Conformity Assessment"
      action: "Engage a Notified Body for conformity assessment and obtain CE marking before EU market entry. Estimated 8-12 months lead time."
      citation:
        id: "art43"
        text: "Article 43: Conformity assessment for high-risk AI systems"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 43"
      confidence: "High"
    
    - id: "dpia"
      title: "Data Protection Impact Assessment (DPIA)"
      action: "Conduct comprehensive DPIA under GDPR Article 35, documenting data processing risks and mitigation measures for AI training and inference."
      citation:
        id: "art10-5"
        text: "Article 10: Data governance and quality requirements"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 10(5)"
      confidence: "High"
    
    - id: "bias-testing"
      title: "Bias and Fairness Evaluation"
      action: "Implement ongoing bias monitoring and testing protocols. Document dataset composition, model performance across demographic groups, and mitigation strategies."
      citation:
        id: "art10-2"
        text: "Article 10: Data governance - bias detection and mitigation"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 10(2)(f)"
      confidence: "High"
    
    - id: "post-market"
      title: "Post-Market Monitoring System"
      action: "Establish post-market monitoring plan to track AI system performance, adverse events, and user feedback. Report serious incidents to authorities."
      citation:
        id: "art61"
        text: "Article 61: Post-market monitoring by providers"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 61"
      confidence: "Medium"
    
    - id: "technical-docs"
      title: "Technical Documentation Package"
      action: "Compile comprehensive technical documentation including risk management, dataset specs, model architecture, testing results, and human oversight measures."
      citation:
        id: "art11"
        text: "Article 11: Technical documentation requirements"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 11"
      confidence: "High"

  Limited-Risk:
    - id: "transparency"
      title: "Transparency Disclosure"
      action: "Implement clear user notifications that they are interacting with an AI system. Include disclosure in UI and terms of service."
      citation:
        id: "art52-1"
        text: "Article 52: Transparency obligations for AI systems"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 52(1)"
      confidence: "High"
    
    - id: "record-keeping"
      title: "Record-Keeping Obligations"
      action: "Maintain logs of AI system operations, user interactions, and any modifications. Keep records for audit purposes."
      citation:
        id: "art12"
        text: "Article 12: Record-keeping for high-risk AI systems"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 12"
      confidence: "Medium"

  Minimal-Risk:
    - id: "basic-docs"
      title: "Basic Documentation"
      action: "Maintain basic documentation of AI system capabilities, limitations, and intended use. No formal conformity assessment required."
      citation:
        id: "recital71"
        text: "Recital 71: Minimal obligations for low-risk AI"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Recital 71"
      confidence: "Low"
