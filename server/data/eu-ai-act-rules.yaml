# EU AI Act Classification Rules
# Use case → Tier mapping with rationale

classifications:
  - useCase: "Medical Diagnosis"
    tier: "High-Risk"
    reason: "AI systems used for medical diagnosis are classified as high-risk under Annex III as they are safety components of medical devices and can significantly impact health and safety. They require conformity assessment, human oversight, and risk management systems."
    citations:
      - id: "annex3-1"
        text: "Annex III: AI systems intended to be used as safety components of medical devices"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Annex III(1)"
      - id: "art6-1"
        text: "Article 6: High-risk AI systems requiring strict compliance"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 6(1)"
  
  - useCase: "Biometric Identification"
    tier: "High-Risk"
    reason: "Real-time remote biometric identification systems in publicly accessible spaces are prohibited or high-risk under Article 5. They pose significant risks to fundamental rights and require strict safeguards."
    citations:
      - id: "art5-1"
        text: "Article 5: Prohibited AI practices including certain biometric systems"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 5(1)(d)"
      - id: "annex3-1b"
        text: "Annex III: Biometric identification and categorization of natural persons"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Annex III(1b)"

  - useCase: "Credit Scoring"
    tier: "High-Risk"
    reason: "AI systems for creditworthiness assessment are high-risk as they impact access to essential services and can lead to discrimination. Requires transparency, fairness testing, and human oversight."
    citations:
      - id: "annex3-5b"
        text: "Annex III: AI systems for creditworthiness assessment"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Annex III(5)(b)"
      - id: "art13"
        text: "Article 13: Transparency and provision of information to users"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 13"

  - useCase: "Recruitment Screening"
    tier: "High-Risk"
    reason: "AI systems for recruitment and worker management are high-risk under Annex III as they affect employment and workers' rights. Requires bias testing, transparency, and human oversight."
    citations:
      - id: "annex3-4"
        text: "Annex III: AI systems for recruitment and selection of natural persons"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Annex III(4)(a)"
      - id: "art10"
        text: "Article 10: Data and data governance requirements"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 10"

  - useCase: "Predictive Policing"
    tier: "High-Risk"
    reason: "AI for law enforcement risk assessment is high-risk, involving fundamental rights. Requires strict data governance, human oversight, and transparency to prevent discrimination."
    citations:
      - id: "annex3-6"
        text: "Annex III: AI systems for law enforcement risk assessment"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Annex III(6)(b)"
      - id: "art52"
        text: "Article 52: Transparency obligations for certain AI systems"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 52"

  - useCase: "Content Moderation"
    tier: "Limited-Risk"
    reason: "Content moderation AI has limited risk classification, primarily requiring transparency obligations under Article 52 to inform users they're interacting with AI."
    citations:
      - id: "art52-1"
        text: "Article 52: Transparency obligations - users must be informed"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 52(1)"
      - id: "recital71"
        text: "Recital 71: Limited risk systems require transparency"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Recital 71"

  - useCase: "Customer Service Chatbot"
    tier: "Limited-Risk"
    reason: "Customer service chatbots are limited-risk, requiring users to be informed they're interacting with AI. Lower compliance burden compared to high-risk systems."
    citations:
      - id: "art52-1"
        text: "Article 52: Transparency obligations for AI systems interacting with humans"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 52(1)"

  - useCase: "Other"
    tier: "Limited-Risk"
    reason: "General AI systems not explicitly categorized typically fall under limited-risk, requiring transparency obligations and minimal compliance requirements."
    citations:
      - id: "art52"
        text: "Article 52: General transparency obligations"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021PC0206"
        article: "Article 52"
